# 全量回归测试 — 覆盖所有场景
name: 全量回归测试
description: 覆盖充电流程、场景脚本、异常模拟等全部功能
env: pre

steps:
  # ── 充电流程 ──
  - action: plug_charge
    name: 即插即充

  - action: sleep
    seconds: 3

  - action: scan_charge
    name: 扫码充电

  - action: sleep
    seconds: 3

  # ── 场景脚本 ──
  - action: summary
    name: 充电小结

  - action: sleep
    seconds: 3

  - action: satisfaction
    name: 满足度-正常
    mode: normal

  - action: sleep
    seconds: 3

  - action: satisfaction
    name: 满足度-车桩错配
    mode: mismatch

  - action: sleep
    seconds: 3

  - action: satisfaction
    name: 满足度-分流
    mode: shunt

  - action: sleep
    seconds: 3

  - action: identity_theft
    name: 身份盗用-正常
    mode: normal

  - action: sleep
    seconds: 3

  - action: identity_theft
    name: 身份盗用-电池类型不一致
    mode: bat-type

  - action: sleep
    seconds: 3

  - action: identity_theft
    name: 身份盗用-容量偏差
    mode: ah-bias

  - action: sleep
    seconds: 3

  - action: identity_theft
    name: 身份盗用-能量偏差
    mode: kwh-bias

  - action: sleep
    seconds: 3

  # ── 异常模拟 ──
  - action: fault_error
    name: 故障 E07
    code: E07

  - action: fault_estop
    name: 急停

  - action: fault_upgrading
    name: 升级中

  - action: fault_start_fail
    name: 启动失败

  - action: fault_gun_lock
    name: 锁枪
